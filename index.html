<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>TimLabs | Лаборатория ИИ и системная автоматизация бизнеса</title>
    <meta name="description" content="TimLabs — системный интегратор нейросетей. Внедряем автономных ИИ-агентов (ИИ-продавец, ИИ-рекрутер) для вывода бизнеса из операционки. Строго по 152-ФЗ.">
    <meta name="keywords" content="ИИ для бизнеса, нейросети, автоматизация продаж, ИИ-рекрутер, автоматизация бизнеса, TimLabs, Тим Гуцев">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="TimLabs | Лаборатория ИИ и автоматизации бизнеса">
    <meta property="og:description" content="Внедряем автономных ИИ-агентов. Они продают, нанимают сотрудников и ведут CRM за вас — 24/7.">
    <meta property="og:image" content="splash.jpeg">
    <meta property="og:url" content="https://timlabs.online/">
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; scroll-behavior: smooth; margin: 0; padding: 0; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .text-gradient { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: linear-gradient(90deg, #00b4ff, #d100ff); }
        .neon-glow { box-shadow: 0 0 20px rgba(0, 180, 255, 0.3), 0 0 40px rgba(209, 0, 255, 0.2); }
        
        /* Залипательные анимации */
        .text-gradient-animated {
            background: linear-gradient(270deg, #00b4ff, #d100ff, #00b4ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 4s ease infinite;
        }
        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Медленное фоновое хаотичное движение */
        .animate-float-1 { animation: float1 25s ease-in-out infinite; }
        .animate-float-2 { animation: float2 30s ease-in-out infinite; }
        
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(2%, 5%) scale(1.05); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-2%, -5%) scale(1.02); }
        }

        .loader { border: 3px solid rgba(0, 180, 255, 0.1); border-top: 3px solid #00b4ff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Фон сетка */
        .bg-grid { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px); background-size: 50px 50px; z-index: 0; pointer-events: none; mask-image: radial-gradient(circle at center, black 30%, transparent 80%); }

        /* Контейнеры для параллакса */
        #tilt-container { transition: transform 0.1s ease-out; transform-style: preserve-3d; }
        #background-parallax-inner { transition: transform 0.15s ease-out; }
    </style>
</head>
<body class="antialiased selection:bg-[#00b4ff] selection:text-black">

    <div id="background-parallax-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div id="background-parallax-inner" class="absolute inset-0">
            <div class="bg-grid absolute inset-0 opactiy-60"></div>
            
            <div class="absolute inset-0 opacity-40">
                <div class="absolute top-[-15%] -left-1/4 w-[80%] h-[80%] bg-[#00b4ff] blur-[150px] rounded-full animate-float-1"></div>
                <div class="absolute bottom-[-15%] -right-1/4 w-[80%] h-[80%] bg-[#d100ff] blur-[150px] rounded-full animate-float-2"></div>
            </div>
        </div>
    </div>

    <canvas id="neuro-canvas" class="fixed inset-0 z-[5] pointer-events-none opacity-60"></canvas>

    <main class="relative z-10 w-full min-h-screen mx-auto px-4 text-center flex flex-col items-center justify-center pointer-events-none">
        <div id="tilt-container">
            <div class="mb-8">
                <span class="text-2xl sm:text-3xl font-extrabold tracking-tight text-white leading-none">
                    Tim<span class="text-gradient-animated">Labs</span>
                </span>
            </div>

            <div class="inline-flex items-center px-4 py-2 rounded-full border border-[#00b4ff]/30 bg-[#00b4ff]/10 text-[#00b4ff] text-xs sm:text-sm font-bold tracking-widest uppercase mb-8 backdrop-blur-sm shadow-[0_0_15px_rgba(0,180,255,0.2)]">
                <span class="w-2 h-2 rounded-full bg-[#00b4ff] mr-2 animate-pulse"></span>
                Обновление ИИ-ядра
            </div>

            <h1 class="text-4xl sm:text-6xl md:text-7xl lg:text-8xl font-black mb-8 tracking-widest uppercase font-orbitron leading-tight text-white" style="text-shadow: 0 0 30px rgba(0, 180, 255, 0.4), 0 0 60px rgba(209, 0, 255, 0.2);">
                <span class="text-gradient-animated">Технические</span><br>
                работы
            </h1>

            <p class="text-gray-300 text-base sm:text-xl md:text-2xl max-w-2xl mx-auto leading-relaxed mb-12 font-light">
                Мы улучшаем инфраструктуру нейросетей и внедряем новые алгоритмы. Лаборатория вернется в онлайн совсем скоро.
            </p>

            <div class="mb-12">
                <div class="loader" style="width: 40px; height: 40px;"></div>
            </div>
        </div>
    </main>

    <script>
        // 1. ЕДИНЫЙ ТРЕКЕР МЫШИ для всех эффектов параллакса
        document.addEventListener('mousemove', (e) => {
            const { innerWidth, innerHeight } = window;
            const mouseX = e.pageX;
            const mouseY = e.pageY;

            // Центрируем координаты мыши (-0.5 до 0.5)
            const normX = (mouseX / innerWidth) - 0.5;
            const normY = (mouseY / innerHeight) - 0.5;

            // А) Эффект наклона (3D Tilt) для центрального текста
            const container = document.getElementById('tilt-container');
            if (container) {
                const tiltStrength = 15; // Сила наклона
                const tiltX = normY * tiltStrength * -1; // Инверсия по X для естественности
                const tiltY = normX * tiltStrength;
                container.style.transform = `rotateY(${tiltY}deg) rotateX(${tiltX}deg)`;
            }

            // Б) Эффект глубокого параллакса для ФОНА (пятна и сетка)
            const bgInner = document.getElementById('background-parallax-inner');
            if (bgInner) {
                const bgStrength = 40; // Сила смещения фона (px)
                const bgX = normX * bgStrength;
                const bgY = normY * bgStrength;
                // Смещаем фон в ту же сторону, что и мышь, создавая ощущение глубины
                bgInner.style.transform = `translate(${bgX}px, ${bgY}px)`;
            }
        });

        // 2. Интерактивная нейронная сеть на Canvas (Частицы)
        const canvas = document.getElementById('neuro-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        // Отслеживание мыши для частиц
        let neuroMouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (event) => {
            neuroMouse.x = event.x;
            neuroMouse.y = event.y;
        });

        window.addEventListener('mouseout', () => {
            neuroMouse.x = undefined;
            neuroMouse.y = undefined;
        });

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor(x, y, dx, dy, size, color) {
                this.x = x; this.y = y;
                this.dx = dx; this.dy = dy;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false); ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                if (this.x > width || this.x < 0) this.dx = -this.dx; if (this.y > height || this.y < 0) this.dy = -this.dy;
                this.x += this.dx; this.y += this.dy;
                if (neuroMouse.x != null) {
                    let dx = neuroMouse.x - this.x; let dy = neuroMouse.y - this.y; let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < neuroMouse.radius) {
                        const forceDirectionX = dx / distance; const forceDirectionY = dy / distance; const force = (neuroMouse.radius - distance) / neuroMouse.radius;
                        this.x += forceDirectionX * force * 2.5; this.y += forceDirectionY * force * 2.5;
                    }
                }
                this.draw();
            }
        }

        function initParticles() {
            particles = []; const numberOfParticles = (width * height) / 10000;
            const colors = ['#00b4ff', '#d100ff'];
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 0.5;
                let x = Math.random() * width; let y = Math.random() * height;
                let dx = (Math.random() - 0.5) * 0.8; let dy = (Math.random() - 0.5) * 0.8;
                let color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, dx, dy, size, color));
            }
        }

        function animateCanvas() {
            requestAnimationFrame(animateCanvas); ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x; let dy = particles[i].y - particles[j].y; let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = (particles[i].color === '#d100ff') ? `rgba(209, 0, 255, ${1 - distance/120})` : `rgba(0, 180, 255, ${1 - distance/120})`;
                        ctx.lineWidth = 0.5; ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
        }

        resizeCanvas();
        animateCanvas();
    </script>

   </body>
</html>
